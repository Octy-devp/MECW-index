  specific: |
    The German Social Democratic Party's unification (Gotha 1875)
    and Dühring's rising influence threatened to replace Marx's
    scientific socialism with an ahistorical, moralistic system.
    Engels brings this theoretical crisis into sharp relief against
    the backdrop of capitalism's inherent structural crisis: "the
    colossal productive forces created within the capitalist mode
    of production… can no longer master… they are only waiting to
    be taken possession of by a society organised for co-operative
    work on a planned basis." The bourgeoisie is visibly incapable
    of controlling the forces it unleashed; the proletariat emerges
    as the class that can abolish all classes. Dühring's system, by
    tracing exploitation to "force" rather than to the economic laws
    of commodity production and capital accumulation, disarms the
    workers' movement of its scientific weapon precisely when the
    objective crisis demands revolutionary clarity.
  evidence:
