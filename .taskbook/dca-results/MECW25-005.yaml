reasoning: |
  This text is from Engels' 1877–78 *Anti-Dühring*, written to combat
  Eugen Dühring's growing influence within the German Social Democratic
  Party. Engels diagnoses a twofold crisis: (1) a structural crisis of
  capitalism, where colossal productive forces can no longer be mastered
  by the bourgeoisie, creating a revolutionary proletariat; (2) a
  theoretical crisis within the socialist movement, as Dühring's system
  reverts to ahistorical "eternal natural laws" and substitutes moral
  justice for scientific necessity. The lag is both theoretical and
  ideological — Dühring detaches distribution from production, reduces
  historical causality to force, and appeals to subjective "justice"
  rather than material development. This obscures the economic laws of
  capitalist contradiction and proletarian revolution, retarding
  class consciousness. The alternative is Marx's materialist political
  economy, which demonstrates capitalism's self-dissolution and the
  material basis for socialism. Direction is constrained by the
  objective development of productive forces: capitalism must mature
  to become a fetter, and the proletariat must become a conscious,
  majority class — political force cannot substitute for economic
  development.

