      for the Ur‑cantons. For five hundred years they have been the 
      drainage channel for the superfluous population, and hence the 
      best guarantee for the existing barbarous state of things.”
    - “Annul the enlistment agreements, and you will unleash a real 
      revolution in these so‑called clean, i.e. in fact extremely 
      unclean, democracies.”

