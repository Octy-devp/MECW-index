reasoning: |
  Engels’s December 1848 dispatch diagnoses a structural crisis in the 
  Swiss Ur‑cantons triggered by the new Federal Constitution’s ban on 
  foreign military enlistments. For five centuries the mercenary trade 
  had drained surplus population and preserved “the existing barbarous 
  state of things.” By removing this outlet, the ban will produce a 
  class of peasant proletarians—“younger sons of peasants” forced to 
  stay home—who cannot be absorbed in sterile mountain economies and 
  will inevitably overturn “all the old relations of property, property 
  acquirement and law.” The lag is political‑ideological: the Ur‑cantons 
  cling to the “right of self‑sale” as a hallowed privilege, while 
  Lucerne stalls, demanding indemnities, and existing agreements still 
  run. Engels offers no explicit programme here, but the direction he 
  predicts is a “real revolution” that will uproot Europe’s oldest 
  seat of reactionary barbarism. The material constraint is absolute: 
  “Where would these sterile mountain lands get the means to feed the 
  paupers?” The old order is perishing of “pecuniary consumption” and 
  “financial need”—a death sentence for the reactionary republics.

