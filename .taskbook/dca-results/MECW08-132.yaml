  This note by Marx reports the prohibition of a torchlight procession
  for Gottschalk's release in December 1848. The acquittal by jury was
  seen as a democratic victory, but the police and military authorities
  refused permission. The note exposes the state's logic: "because they
  once had them arrested the authorities cannot now allow the torchlight
  procession to take place." This reveals the crisis of bourgeois legality
  in the counterrevolutionary aftermath of 1848, where legal forms are
  nullified by executive power. The lag is both organizational (the
  Workers' Association sought permission rather than asserting a right)
  and ideological (trust in the neutrality of the state). The alternative
