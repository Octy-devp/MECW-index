```yaml
reasoning: |
  Marx's 1881 marginal notes target Adolph Wagner's "socio-legal" textbook, which
  misrepresents Marx's value theory and regresses to pre-scientific conflations of
  use‑value and value. Marx treats this not as a mere scholarly error but as a crisis
  of theoretical regression — the gains of *Capital* are being erased by a school that
  derives economic categories from universal "man" instead of analysing the historically
  specific commodity form. The lag is ideological and institutional: German professors,
  still anchored in feudal "muck" and servile to the state, substitute concept‑association
  for historical materialism. The alternative is a systematic restatement of Marx's own
  method — starting from the concrete commodity, analysing the dual character of labour,
  and showing that value is a social, not natural, category. The direction is constrained
  by material history: the categories of political economy are valid only for capitalist
  society; any "social state" (Schäffle's fantasy) would have to be built on different
  productive foundations, where the value‑form itself would be transcended. Marx's
  polemic thus re‑establishes the scientific critique as the necessary theoretical
  weapon for the working‑class movement.

crisis_diagnosis:
  type: theoretical_regression_in_political_economy
  specific: |
    The 1879 textbook by Adolph Wagner (and the broader "socio-legal" school including
    Rodbertus and Schäffle) attempts to absorb and "correct" Marx's value theory by
    subsuming it under a universal, ahistorical concept of "value" derived from
    "man's natural striving." This is a principled retreat from the scientific gains
    of *Capital*, where value is shown to be a historically specific social relation
    rooted in abstract labour. Marx sees this regression as actively harmful — it
    confuses workers and provides ideological cover for the capitalist state.
  evidence:
    - "Mr. Wagner... finds himself 'in accord with Rodbertus, Lange and Schäffle'"
    - "Since I have never established a 'socialist system,' this is a fantasy of Wagner,
      Schäffle e tutti quanti."
    - "Nowhere do I speak of 'the common social substance of exchange-value'... I rather say
      that exchange-values... represent something common to them... namely 'value'."
    - "The same Wagner places me... amongst those according to whom 'use-value' should be
      entirely 'removed' 'from the science.' All this is 'drivel'."

lag_mechanism:
  layers:
    - ideological
    - institutional
    - methodological
  ideological: |
    Wagner and the German professors are trapped in a pre-scientific worldview. They
    start from the abstract "man" with "natural strivings" rather than from historically
    specific social forms. They confuse use-value and value because German linguistic
    usage merges *Wert* and *Würde*, and because they have not grasped the dialectical
    method. As Marx notes: "only a vir obscurus who has not understood a word of Capital
    can conclude... use-value plays no part in his work." This ideological lag is not
    innocent — it serves to obscure the class character of capitalist production.
  institutional: |
    The German professoriate is embedded in a state apparatus that rewards apologetics.
    Marx likens them to serfs who have merely exchanged a feudal master for the state:
    "From being the serfs of landowners they have turned into the serfs of the state,
    vulgo the government." This institutional position produces a "servile belief in the
    state" and in the eternal necessity of capitalist categories. Wagner adds "state
    services" to "economic goods" precisely to portray himself and the state bureaucracy
    as productive workers.
  methodological: |
    Wagner's method is a regressive "concept-association" (German professorial association-
    of-concepts method). Instead of analysing the concrete commodity, he "derives" value
    from a concept, then sub-divides it into subjective and objective aspects. This is a
    fundamentally non‑historical procedure that cannot reach the real relations. Marx states:
    "I do not proceed from 'concepts,' hence neither from the 'concept of value'... What I
    proceed from is the simplest social form in which the product of labour presents itself
    in contemporary society, and this is the 'commodity'." Wagner's method thus necessarily
    fails to see the specific historical character of value and surplus-value.

alternative_proposal:
  method: restatement_and_defense_of_dialectical_method
  elements:
    - Start from the concrete social form: the commodity, not abstract "man" or "goods"
    - Analyse the twofold nature of the commodity: use-value (natural form) and value
      (social form)
    - Show that value is an expression of *abstract labour* — the expenditure of
      labour‑power regardless of its concrete useful form; this is the "common social
      substance" Wagner wrongly attributes to exchange-value
    - Demonstrate that exchange-value is the necessary *form of appearance* of value,
      not value itself
    - Trace the development of the value‑form from simple to money form, showing how
      value necessarily appears in the use-value of another commodity
    - Establish that use-value plays a crucial but historically specific role: e.g., the
      "specific use-value of labour-power" (its capacity to create more value than it
      costs) is the source of surplus-value
    - Reject all ahistorical attempts to "include" non-commodity goods (state, services)
      in the concept of value; these are different social forms that must be analysed on
      their own terms
    - Affirm that the scientific analysis of capitalist society reveals its transitory
      character, but without constructing "social systems" a priori

direction_constraint:
  core: categories_are_historically_specific_and_rooted_in_mode_of_production
  specific: |
    Marx rejects Schäffle's speculations about a "social state" as external to the analysis
    of value. The categories of political economy — commodity, value, money, capital — are
    valid only for bourgeois society. As Marx states: "my investigation of value I have
    dealt with bourgeois relations, not with... a 'social state' not even constructed by
    me." The direction of social development is constrained by material conditions: a
    post-capitalist society would have to be built on the productive forces developed under
    capitalism, and would likely involve the withering away of the value-form itself.
    However, the "social state" Schäffle imagines would still have to respect objective
    economic laws; Marx mocks the idea that such a state could simply ignore the law of
    value: "how terrible for the 'social state' to infringe the laws of value of the
    'capitalist (bourgeois) state'!" This indicates that any alternative must emerge from
    the immanent contradictions of capitalism and cannot be a mere conceptual "tying up" of
    use-value and welfare. The key insight is that right and value are not eternal but
    correspond to a definite economic structure; their transcendence presupposes a
    revolution in the productive forces and the social relations of production.
  key_insight: |
    "Thus I do not divide value into use-value and exchange-value... but the concrete
    social form of the product of labour, the 'commodity,' is on the one hand, use-value
    and on the other, 'value'."
```