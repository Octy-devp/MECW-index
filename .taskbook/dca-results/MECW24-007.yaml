reasoning: |
  Marx's 1875 epilogue reconnects the 1852 Cologne trial to the contemporary political landscape, using it as a lens to diagnose the state's persistent yet futile repression. The crisis is not a single event but a structural contradiction: the Prussian-German state, now under Bismarck, expands its political police to crush the workers' party, yet this very police apparatus exposes its impotence against the irreversible advance of communist ideas. Marx cites the open proclamation of the Manifesto's principles in the Reichstag as evidence. The lag is twofold: first, a state-ideological lag where the police believe it can dictate history, evidenced by its arbitrary persecutions (first of unity advocates, then of dissenters); second, a post-1848 movement lag, where sectarian 'refugee foolishness' delayed consolidation, though eventually overcome. The alternative is already unfolding: the movement has won by outgrowing conspiracy, its principles now openly advocated worldwide. The direction is constrained by the objective laws of social development: capitalist society inherently generates its own negation, and the proletariat's rise is as inevitable as 'society revolving around the sun of labour.' The state's 'inner Jena' is its historical blindness.

crisis_diagnosis:
  type: state_repression_impotence
  specific: |
    The German Empire's political police, now unrestricted under Stieber, aims to eliminate the workers' party but merely proves its inability to halt social development. The 1852 conviction of communists for spreading the principles of the Communist Manifesto is now mocked by those principles being openly proclaimed in the Reichstag. The crisis is that the state's repressive apparatus, grown to a 'moral person' with shadowy power, is structurally incapable of succeeding—it is 'not called on to make history.'
  evidence: [
    "The Communist trial itself brands the state power's impotence in its struggle against social development.",
    "Are not the same principles being proclaimed openly in the streets in Germany twenty years later? Do they not resound even from the tribune of the Reichstag?",
    "The German proletariat can, therefore, measure the progress of the movement ... by Stieber's growth in stature.",
    "Today it is just as vainly attempting to eradicate the enemies of the Empire as it once tried to eradicate the friends of the Empire."
  ]

lag_mechanism:
  layers: [state_ideological, movement_postrevolutionary]
  state_ideological: |
    The state apparatus suffers from a delusion of omnipotence, treating the political police as infallible and believing its coercive force can shape historical outcomes. This lag manifests in the police's absurd shifts—first persecuting advocates of German unity (as in the trial of 'young hotheads'), then jailing those who refuse to praise the Empire. Such contradictions expose a blind refusal to grasp that material development, not police actions, drives history.
  movement_postrevolutionary: |
    After the 1848 revolution's violent suppression, even capable revolutionaries experienced a 'shock' that 'renders even the most able people ... not responsible for their actions.' This led to a phase of 'conspiratorial and revolutionary games,' as seen in the Willich-Schapper group's errors. These sectarian adventures were a lag in the movement's maturation, though Marx notes Schapper later confessed his 'refugee foolishness' on his deathbed, demonstrating the lag was overcome.

alternative_proposal:
  method: open_mass_agitation
  elements:
    - The movement no longer needs secrecy; the principles of the Communist Manifesto are now proclaimed 'openly in the streets' and even in parliament.
    - Progress is measured by the adversary's growth: Stieber's enlarged police power paradoxically signals the proletariat's advance, so continued public organization and propaganda are sufficient.
    - The ultimate aim is expressed as an objective necessity: 'Society simply does not find its equilibrium until it revolves around the sun of labour.'

direction_constraint:
  core: inevitable_crisis_of_bourgeois_society
  specific: |
    The state's repression is doomed not by activist will but by the objective movement of capitalist society, which breeds its own gravediggers. The 'inner Jena' and 'inner Düppel' metaphors signal that internal contradictions will defeat the state, just as external wars once did. The direction is constrained by the fact that the proletariat's rise flows from the very development of wage-labour and class antagonisms; the state cannot escape the 'irresistible' spread of socialist principles because they embody the social reality of an exploited class.
  key_insight: "The royal Prussian state prosecutor ultimately based the guilt of the accused on the fact that they secretly disseminated the subversive principles of the Communist Manifesto. Are not the same principles being proclaimed openly in the streets in Germany twenty years later?"

