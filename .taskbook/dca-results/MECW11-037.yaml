    of the increased productive power creating a surplus population
    that is driven away by famine or emigration. The same process
    concentrates the industrial proletariat in manufacturing towns,
    while the bourgeoisie justifies it through the 'net revenue'
    doctrine. The crisis is systemic: the productive forces have
    outgrown the existing property relations, leading to mass
    expropriation. On the Continent, revolutionary unrest simmers
    ('heaven is fulminating'), but in England the economic
    foundation itself is trembling — 'the earth itself is trembling.'
