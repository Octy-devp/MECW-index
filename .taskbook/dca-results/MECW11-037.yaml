reasoning: |
  The 1853 article weaves together forced emigration from Britain
  (especially of Celtic populations), European refugee politics,
  election bribery, and a critique of Cobden. Marx diagnoses the
  forced emigration not as a natural population surplus but as a
  consequence of the increase in productive power under capitalism
  — a "modern compulsory emigration" that expropriates small
  producers. He draws a contrast with ancient colonization, showing
  that now it is not a lack of productive power but its excess that
  drives out population. This creates a revolutionary situation: the
  rural population is dispersed while the industrial proletariat is
  concentrated in manufacturing towns, positioned to appropriate the
  very forces that have expropriated them. The political events
  (Kossuth's vacillation, Palmerston's posture, election bribery) are
  surface phenomena masking the underlying class contradiction. The
  lag is ideological (bourgeois economists justify the destruction,
  workers are not yet conscious) and organizational (the proletariat
  is concentrated but not yet acting). The alternative is not a
  reform project but a historical prognosis: the proletariat will
  "go a step further and appropriate these forces." The direction is
  constrained by the material development of productive forces
  — the transition cannot be willed; it emerges from the silent
  revolution in the economic base, which must first run its course
  in the most advanced capitalist country (England).

