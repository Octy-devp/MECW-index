reasoning: |
  Engels' "Barbarism and Civilization" traces the structural crisis of class society from its origins in the dissolution of the gentile constitution to its inevitable self-destruction. The crisis is not a specific historical event but the internal contradiction of civilization itself: the development of productive forces undermines collective production, creates class antagonisms, and necessitates the state, which in turn cannot resolve the fundamental contradiction. The lag mechanism operates at political, ideological, and economic levels—the state suppresses open class conflict, ideology masks exploitation, and commodity production imposes blind laws that dominate producers. The alternative emerges from historical necessity: the abolition of classes and the state through the conscious reorganization of production by the associated producers, culminating in a higher form of society foreshadowed by Morgan's vision. The direction is constrained by material conditions: the productive forces must develop to a point where class rule becomes a fetter, and the working class must achieve maturity and self-consciousness, gauged by universal suffrage. The text provides a complete DCA structure, culminating in the famous prophecy that the state will join the spinning wheel and the bronze ax in the museum of antiquities.

crisis_diagnosis:
  type: structural_contradiction_of_civilization
  specific: |
    Civilization, defined by commodity production, division of labor, private property, and class rule, is founded on exploitation. Its own development intensifies the antagonisms between producers and the alien powers of the market, between town and country, and between exploiting and exploited classes. The gentile constitution, rooted in kinship and collective production, was shattered by these forces, leaving society "cleft into irreconcilable antagonisms which it is powerless to exorcise." Periodic trade crises, the state's growing coercive power, and the "insoluble self-contradiction" reveal that civilization has become a positive hindrance to further development.
  evidence:
    - "the state ... is the admission that this society has involved itself in insoluble self-contradiction and is cleft into irreconcilable antagonisms"
    - "Every step forward in production is at the same time a step backwards in the position of the oppressed class"
    - "the product rules the producer ... the total production of society is regulated, not by a jointly devised plan, but by blind laws, which manifest themselves with elemental violence, in the final instance in the storms of the periodical trade crises"

lag_mechanism:
  layers: [political, ideological, economic]
  political: |
    The state, as a public force standing above society, suppresses open class warfare and serves the economically ruling class. Even in democratic republics, wealth rules indirectly through corruption and the alliance of government and stock exchange. Universal suffrage, while a gauge of working-class maturity, is initially a tool keeping the proletariat as the "tail of the capitalist class." The state's repressive apparatus and taxation system maintain class rule.
  ideological: |
    Civilization develops a "conventional hypocrisy" to mask exploitation—charity, love, and the pretense that exploitation benefits the exploited. The ruling class identifies its interests with society's, obscuring the contradiction. Moreover, the laws of commodity production appear as natural, alien forces beyond human control, so that "the product rules the producer" and economic necessity seems unchangeable.
  economic: |
    The division of labor, commodity production, private property, money, and the rise of merchants create an autonomous economic realm governed by blind laws. Concentration of wealth, usury, mortgage, and periodical trade crises proceed with "elemental violence," while producers lose control over their own product. This economic machinery, though historically necessary, now entraps society and deepens class antagonisms.

alternative_proposal:
  method: historical_materialist_prognosis_of_inevitable_transformation
  elements:
    - "The society which organizes production anew on the basis of free and equal association of the producers" will abolish the state, placing the whole state machinery "into the museum of antiquities, next to the spinning wheel and the bronze ax."
    - Classes "will fall as inevitably as they once arose" because they become a hindrance to production.
    - Morgan's vision of "democracy in government, brotherhood in society, equality in rights and privileges, and universal education" foreshadows "the next higher plane of society ... a revival, in a higher form, of the liberty, equality and fraternity of the ancient gentes."
    - The alternative rests on the development of large-scale industry, which makes possible women's emancipation by drawing them into social production and transforming private domestic labor.

direction_constraint:
  core: productive_forces_and_class_maturity
  specific: |
    The transition is possible only when the development of production reaches a point where classes cease to be a necessity and become a "positive hindrance." This requires the maturation of the working class toward self-emancipation, measured objectively by the thermometer of universal suffrage. The democratic republic is the form in which the final battle can be fought, but the material conditions determine when the contradiction becomes unsustainable. The large-scale industry that capitalism creates also provides the material basis for ending private domestic labor and achieving women's emancipation.
  key_insight: "We are now rapidly approaching a stage in the development of production at which the existence of these classes has not only ceased to be a necessity, but becomes a positive hindrance to production. They will fall as inevitably as they once arose."