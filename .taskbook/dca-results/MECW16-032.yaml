  explanation: |
    This is a journalistic analysis for the New-York Daily Tribune,
    not a manifesto or programmatic document. Marx offers no positive
    political alternative. His intervention is diagnostic: by exposing
    the financial and dynastic machinery behind the war scare, he arms
    a working-class readership against nationalist manipulation. The
    implicit alternative is class-conscious refusal to be cannon-fodder
    for stock-jobbers.

direction_constraint:
  core: finance_capital_imposes_war_rhythms
  specific: |
    War is not determined by chauvinist passions but by the ability to
    raise credit in the London money market. This gives the appearance
    of capitalist peace-promotion, yet “the very same circumstances
    which may put off the European war… push on to such an issue.”
    Ultimately, the direction (peace or war) is constrained by the
    contradictory pressures of financial speculation, dynastic
    survivalism, and the latent threat of popular revolt. The
    Bonapartist regime needs a victorious war to “cement that monster
    imposture,” but it cannot survive a defeat. The material basis of
    these regimes—their dependence on loans and their fear of the
    classes that pay the bills—sets the boundaries within which
    decisions are taken.
  key_insight: |
    “No confessor knows more exactly the vulnerable parts of a fair
    penitent’s heart than do the hard-cash men… know where the shoe
    pinches the European potentates.”
