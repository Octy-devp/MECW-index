  He notes the Society's contribution to the 'present movement' and
  expresses hope for its continuation. Engels honors early communists
  (Weitling, Moll) and sarcastically remarks that persecutors like
  Bismarck unwittingly aid the socialist movement. Wroblewski reaffirms
  Polish solidarity. The speech contains no explicit crisis diagnosis
