reasoning: |
  The text responds to two intertwined crises: the immediate political defeat of the 1848 revolutions (mentioned in the editorial preamble and Engels' introduction), which demonstrated that without clear economic understanding the working class cannot advance; and the chronic structural contradiction of capitalism, which produces "immeasurable wealth and a superfluidity of products" alongside a proletarianized majority that "smothers in its own superfluidity." The lag is both theoretical and ideological: classical political economy's category error—treating labor as the commodity sold, rather than labor-power—produced fatal contradictions that blocked scientific understanding of exploitation, while the "most remarkable ignorance and confusion of ideas" among workers and self‑styled socialists prevented coherent class action. The alternative proposed is the scientific concept of labor-power, which reveals the source of surplus‑value and demonstrates that the development of productive forces has objectively created the material basis for a new social order. The direction is constrained by the already‑achieved level of productive forces (making abundance possible) and by the need for a moral‑political transition period in which work becomes a universal obligation, thereby abolishing class differences.

crisis_diagnosis:
  type: structural_contradiction_and_political_defeat
  specific: |
    The post‑1848 conjuncture: the working class had been defeated across Europe (June Days in Paris, fall of Vienna, counter‑revolution in Prussia), yet the underlying economic crisis of capitalism was intensifying. The capitalist order produces "immeasurable wealth and a superfluidity of products with which the buyers cannot cope," while "the great mass of society [is] proletarianized … and thereby disabled from appropriating to themselves that superfluidity of products." This "condition becomes every day more absurd and more unnecessary. It must be gotten rid of; it can be gotten rid of." The political urgency is reinforced by the failure of the 1848‑49 revolutions, which "proved that every revolutionary uprising … must of necessity fail until the revolutionary working class shall have conquered."
  evidence: ["This society smothers in its own superfluidity, while the great majority of its members are scarcely, or not at all, protected from extreme want.", "It must be gotten rid of; it can be gotten rid of.", "the victory of the 'moderate republic' in France sounded at the same time the fall of the nations which had responded to the February revolution with heroic wars of independence"]

lag_mechanism:
  layers: [theoretical, ideological]
  theoretical: |
    Classical political economy, by treating "labor" as the commodity the worker sells, falls into insoluble contradictions. When it tries to determine the "value of labor," it ends either in a "vicious circle" (value of labor determined by labor) or in two different values for the same quantity of labor. "The rock upon which the best economists were stranded, as long as they started out from the value of labor, vanishes as soon as we make our starting‑point the value of labor‑power." This theoretical lag prevents the exposure of exploitation and legitimises the wage‑form as a fair exchange.
  ideological: |
    "There prevails in Germany the most remarkable ignorance and confusion of ideas in regard to the simplest economic relations, from the patented defenders of existing conditions, down to the socialist wonder‑workers and the unrecognized political geniuses." Workers’ own perception that "the capitalist buys their labor with money" is an "illusion" that masks the real relation. Until the scientific distinction between labor and labor‑power is grasped, the class struggle remains mired in false consciousness and reformist programs.

alternative_proposal:
  method: scientific_critique_of_political_economy
  elements:
    - Replace the category "labor" with "labor‑power" to explain surplus value: "What they actually sell to the capitalist for money is their labor‑power. … Labor‑power is … a commodity … the source of more value than it possesses itself."
    - Wages are determined by the cost of production of labor‑power, i.e. the means of subsistence necessary to maintain and reproduce the worker. "The cost of production of simple labor‑power amounts to the cost of the existence and propagation of the worker. The price of this cost of existence and propagation constitutes wages."
    - The capitalist extracts unpaid labor: after working part of the day to reproduce the wage equivalent, the worker "labors … for the capitalist" the remainder of the day. "With each new scientific discovery, with each new technical invention, there also rises the surplus of its daily production over its daily cost, while … there diminishes that part of the working‑day in which the laborer produces the equivalent of his day’s wages."
    - The development of productive forces makes the abolition of class rule possible and necessary: "A new social order is possible, in which the class differences of today will have disappeared … — perhaps after a short transition period … — there will be the means of life … through the systematic use and further development of the enormous productive powers of society … with equal obligation upon all to work."

direction_constraint:
  core: productive_forces_create_possibility_transition_requires_moral_political_shift
  specific: |
    The new social order is not a utopian dream but is materially grounded: "the enormous productive powers of society, which exists with us even now" already make general abundance possible. However, the transition is not automatic; it requires a "short transition period" that "will in any case be very useful morally" — i.e., a period in which new social relations and the ethic of universal work are consolidated. The direction is thus constrained by what the already‑developed productive forces objectively allow and by the subjective moral/political development required to realise a society of "equal obligation upon all to work."
  key_insight: "The condition becomes every day more absurd and more unnecessary. It must be gotten rid of; it can be gotten rid of. A new social order is possible … perhaps after a short transition period, which, though somewhat deficient in other respects, will in any case be very useful morally"