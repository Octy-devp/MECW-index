reasoning: |
  Marx's 1878 riposte to George Howell's article in the *Nineteenth Century* is a forensic defence of the International Working Men's Association's true history against deliberate falsification. Mexico diagnoses a crisis of disinformation: a former member, motivated by personal grievance and class alignment, constructs a legend to discredit the Association and its leading figure. The lag mechanism is multi-layered: personal ambition (Howell's failed editorial bid), ideological conformity (adoption of bourgeois "pseudomorph" style), press hostility (London papers' calumnies), and historical ignorance (ignoring French sources) together enable the fabrication. Marx's alternative is a point-by-point refutation that restores factual truth, exposes the real disputes (Bakunin, religion), demonstrates the International's moral rather than financial strength, and asserts its transformation into a higher stage of national workers' parties. The direction constraint is material: the International's evolution was shaped by state repression and the natural growth of national class parties; its principles persist not in a centralized body but in the very working masses, and its future depends on further adaptation to changing political conditions.

crisis_diagnosis:
  type: historical_falsification
  specific: |
    George Howell, an ex-workman and ex-member of the International's General Council, publishes an article in the July 1878 *Nineteenth Century* that falsely attributes the introduction of the "Religious Idea" to Marx, fabricates a Congress that never occurred, and misrepresents the Association's finances and legacy. Marx diagnoses this as a willful "legend" and "myth" serving both personal pique and bourgeois denigration of a feared working-class movement. The crisis is not merely a factual error but a deliberate attempt to rewrite history and obscure the International's real achievements at a moment when its national offshoots are growing.
  evidence:
    - "'sown the seeds of discord and decay by the introduction of the *Religious Idea*.'"
    - "this, his triple myth, Mr. George Howell caps by a legend."
    - "the stale secret... revealed... with all the consequentiality of the man behind the curtain."
    - "Mr. Howell reaches the climax of snobbism in his account of the exchequer..."

lag_mechanism:
  layers: [personal_ambition, ideological_conformity, press_hostility, historical_ignorance]
  personal_ambition: |
    Howell's motive is traced to his failed attempt to become editor of the *Commonwealth*, the General Council's organ. "Having failed in his 'ambitious' attempt, he waxed sulky, his zeal grew less and less, and soon after he was no more heard of." Personal resentment led him to become an "outsider" and later to invent falsehoods.
  ideological_conformity: |
    Howell has become a "pseudomorph," imitating the manner of thought "natural to the English moneyed man of sated virtue and solvent morals." He adopts bourgeois contempt for poverty ("Poverty is no crime, but it is fearfully inconvenient") and exaggerates the Council's funds to fit capitalist fantasy, while ignoring the real source of its power: "not by length of purse, but by strength of mind and unselfish energy."
  press_hostility: |
    The London press had already execrated Marx's "Address on the Civil War in France"; Howell's article feeds on that hostile climate. Marx notes that even great London papers "ruminating the base calumnies" that their own correspondents refuted. This entrenched media bias provides a receptive platform for fake history.
  historical_ignorance: |
    Howell shows utter incompetence: he confuses a Conference with a Congress, invents the religion dispute, misdates Marx's involvement, and ignores French official documents that confirmed the Address's truth. "An English historian... should haughtily ignore French prints, whether official or not." This ignorance allows the fabrication to appear plausible to the "cultured people" of the *Nineteenth Century*.

alternative_proposal:
  method: forensic_refutation_and_historical_rectification
  elements:
    - Correct the foundational facts: Marx was present at the 1864 foundation meeting, drafted the Inaugural Address and Statutes; the 1865 London gathering was a Conference, not a Congress; the religion topic was introduced by Paris delegates, not Marx, and the General Council later refused theological sections.
    - Expose Howell's personal grudge and the real reason for his departure from the International, undermining his credibility.
    - Demonstrate the International's strength: it inspired fear across Europe despite lean budgets; its influence derived from ideas and organization, not money.
    - Assert the true history of the Association's evolution: after the fall of the Commune, it did not die but "pass from its first period of incubation to a higher one," forming national social-democratic parties in many countries, with growing participation of Slavs. "Thus, instead of dying out, the International did only pass... its already original tendencies have in part become realities."
    - Reaffirm the International's enduring principle: international working-class solidarity rooted in shared class interests, not a centralized secret body.

direction_constraint:
  core: material_development_of_the_workers_movement
  specific: |
    The International's transformation was forced by material conditions: state repression after the Paris Commune temporarily broke the French organization; the gradual formation of "social democratic working-men's parties organised on more or less national dimensions" was not a failure but the natural next stage, where "the working masses themselves" engage in "continuous, active, direct intercourse." The movement's future depends on adapting to political and social obstacles in each country, but its essence is not an eccentric General Council but the self-activity of the proletariat. The true strength of the International was never financial but moral and intellectual, and its direction is set by the capacity of the masses to organize across borders.
  key_insight: |
    "not by length of purse, but by strength of mind and unselfish energy" – the International's world-wide fame and historical place rest on the class-conscious activity of workers, not on the lies of ex-members or the budgets of governments. The direction is constrained by the actual level of working-class development: the International "will yet have to undergo many a change, before the last chapter of its history can be written."